---
# defaults file for filesystem_provision
#
mount_point: ~      # mandatory - where user wants storage mounted
lv_size: ~          # mandatory - how much space e.g. 5G
lv_name: ~          # mandatory - purpose-named e.g. lv_logs
fstype: ext4        # optional  - default ext4, user can choose xfs
vg_name: ~          # optional  - role generates name if not supplied
disk_device: ~      # optional  - role discovers available disk if not supplied

